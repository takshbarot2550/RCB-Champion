<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>RCB Champions 2025</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into just a query string,
      // then redirects to the primary index.html page.
      //
      // If you are deploying your project to a custom domain (e.g. www.example.com) or as a user/organization
      // site (e.g. username.github.io), set pathSegmentsToKeep to 0.
      // If you are deploying as a project site (e.g. username.github.io/repository-name), set pathSegmentsToKeep to 1.
      //
      // In this setup, we dynamically determine the path segments to keep based on the repository name,
      // but to be safe and automatic, we check if the URL contains a project subdirectory.
      
      var pathSegmentsToKeep = 1;
      
      // Auto-detect custom domain or root site vs project site:
      var pathSegments = window.location.pathname.split('/');
      if (window.location.hostname.indexOf('github.io') === -1) {
        // Custom domain -> root path
        pathSegmentsToKeep = 0;
      } else if (pathSegments.length > 1 && pathSegments[1] === '') {
        // User/org site with no path -> root path
        pathSegmentsToKeep = 0;
      }

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
